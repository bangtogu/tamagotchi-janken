<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>참참참 기믹 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
html, body { height: 100dvh; overscroll-behavior: contain; }
body {
  background: #0e0e14;
  color: #c8c0d8;
  font-family: "DotGothic16", system-ui, -apple-system, monospace;
  min-height: 100dvh;
  padding: 36px 16px 60px;
  display: flex; flex-direction: column; align-items: center;
}
.wrapper { width: 100%; max-width: 420px; }
/* ... 나머지 스타일은 그대로 복사해서 넣으세요 (너무 길어서 생략, 이전 코드에서 그대로) */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; }
.overlay.on { display: block; }
.drawer { position: fixed; top:0; right:-310px; bottom:0; width:290px; height:100dvh; background:#11111a; border-left:1px solid #2a2a38; z-index:101; transition:right 0.25s ease; will-change:transform; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:20px 0; }
.drawer.on { right:0; }
</style>
</head>
<body>
<div class="wrapper">
  <!-- HTML 구조 그대로 (header, overlay, drawer, search-row 등) -->
  <header>
    <div>
      <div class="title">🥚 참참참</div>
      <div class="sub">TAMAGOTCHI GIMMICK TRACKER</div>
    </div>
    <button class="ham-btn" id="hamBtn"><span></span><span></span><span></span></button>
  </header>
  <!-- ... 나머지 HTML 그대로 -->
</div>

<script>
"use strict";  // ← 추가: 에러 더 잘 잡아줌

const SEQS = [
  [2,2,2,1,1],[1,2,1,2,1],[2,2,1,1,2],[1,2,1,2,2],[2,1,1,1,2],
  [1,2,1,2,2],[1,1,2,1,2],[1,2,2,2,1],[1,1,2,1,2],[1,2,2,1,1],
  [2,1,2,1,2],[2,2,1,1,1],[2,1,2,1,2],[2,1,1,2,1],[2,1,2,2,2],
  [1,1,1,2,1],[2,1,2,2,1],[1,2,1,2,1]
];
const N = SEQS.length;
let cur = 0;

try {
  const stored = localStorage.getItem("tg");
  if (stored !== null) cur = parseInt(stored, 10) % N;
} catch (e) { cur = 0; }

function save() {
  try { localStorage.setItem("tg", String(cur)); } catch (e) {}
}

function sk(s) { return s.join(""); }

function chipHTML(d, big) {
  const cls = big ? ("cchip cc" + d) : ("chip c" + d);
  return `<div class="${cls}">${d}</div>`;
}

function render() {
  document.getElementById("cnum").textContent = String(cur + 1);
  let h = "";
  for (let i = 0; i < SEQS[cur].length; i++) {
    h += `<div class="dbtn d${SEQS[cur][i]}">${SEQS[cur][i]}</div>`;
  }
  document.getElementById("seqdis").innerHTML = h;
  // ... 나머지 render 로직 그대로 (className 업데이트 등)
}

// buildDrawer, openDrawer, closeDrawer, 이벤트 리스너 등도 template literal(` `)로 바꿔서 에러 방지
// 예: h += `<div class="drow${i === cur ? " cur" : ""}" data-i="${i}"> ... `

// 전체 JS에서 " " 만 사용하고, ' ' 도 피하거나 일관되게
// render(); ← 마지막에 호출 필수

render();  // 페이지 로드 시 즉시 렌더링
</script>
</body>
</html>
