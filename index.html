<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>참참참 기믹 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0e0e14;
  color: #c8c0d8;
  font-family: 'DotGothic16', monospace;
  min-height: 100vh;
  padding: 36px 16px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.wrapper { width: 100%; max-width: 420px; }

header {
display: flex;
align-items: center;
justify-content: center;
position: relative;
margin-bottom: 28px;
}
.title { font-size: 1.4rem; color: #f0c040; letter-spacing: 0.1em; text-align: center; }
.sub { font-size: 0.65rem; color: #4a4560; letter-spacing: 0.2em; margin-top: 4px; }

.ham-btn {
position: absolute; right: 0; top: 0;
background: #16161f; border: 1px solid #2a2a38;
border-radius: 7px; padding: 8px 10px;
cursor: pointer; display: flex; flex-direction: column; gap: 4px;
}
.ham-btn span { display: block; width: 18px; height: 2px; background: #c8c0d8; border-radius: 2px; }

.overlay {
display: none; position: fixed; top:0;left:0;right:0;bottom:0;
background: rgba(0,0,0,0.6); z-index: 100;
}
.overlay.on { display: block; }
.drawer {
position: fixed; top:0; right:-310px; bottom:0; width:290px;
background: #11111a; border-left: 1px solid #2a2a38;
z-index: 101; transition: right 0.25s; overflow-y: auto;
padding: 20px 0;
}
.drawer.on { right: 0; }
.drawer-title { font-size: 0.75rem; color: #4a4560; letter-spacing: 0.18em; padding: 0 18px 12px; border-bottom: 1px solid #2a2a38; margin-bottom: 8px; }
.drow {
display: flex; align-items: center; gap: 8px;
padding: 7px 14px; cursor: pointer;
}
.drow:active { background: #1c1c28; }
.drow.cur { background: rgba(240,192,64,0.1); }
.drow-num { font-size: 0.65rem; color: #4a4560; min-width: 20px; }
.drow.cur .drow-num { color: #f0c040; }
.drow-chips { display: flex; gap: 3px; }
.drow-cur-label { font-size: 0.62rem; color: #f0c040; margin-left: auto; }

.chip {
width: 22px; height: 22px; border-radius: 4px;
display: flex; align-items: center; justify-content: center;
font-size: 0.72rem; font-weight: bold;
}
.c1 { color: #60d0f0; background: rgba(96,208,240,0.12); border: 1px solid rgba(96,208,240,0.25); }
.c2 { color: #f07090; background: rgba(240,112,144,0.12); border: 1px solid rgba(240,112,144,0.25); }

.search-row { display: flex; gap: 8px; margin-bottom: 8px; }
.sinput {
flex: 1; background: #16161f; border: 1px solid #2a2a38;
border-radius: 8px; padding: 11px 14px;
font-family: ‘DotGothic16’, monospace; font-size: 1rem;
color: #c8c0d8; letter-spacing: 0.18em; outline: none;
}
.sinput:focus { border-color: #f0c040; }
.sinput.err { border-color: #f07090; }
.sbtn {
padding: 11px 16px; background: #f0c040; color: #0e0e14;
border: none; border-radius: 8px;
font-family: ‘DotGothic16’, monospace; font-size: 0.8rem; cursor: pointer;
}
.shint { font-size: 0.62rem; color: #4a4560; letter-spacing: 0.1em; margin-bottom: 14px; min-height: 16px; }
.shint.ok { color: #f0c040; }
.shint.no { color: #f07090; }

.rarea { margin-bottom: 20px; }
.rgroup { margin-bottom: 14px; }
.rlabel { font-size: 0.6rem; color: #4a4560; letter-spacing: 0.12em; margin-bottom: 6px; }
.rchain { display: flex; flex-direction: column; gap: 3px; }
.crow {
display: flex; align-items: center; gap: 8px;
padding: 7px 10px; border-radius: 7px;
background: #16161f; border: 1px solid #2a2a38; cursor: pointer;
}
.crow:active { background: #1c1c28; }
.crow.match { border-color: rgba(240,192,64,0.4); background: rgba(240,192,64,0.05); }
.crow.cur { border-color: #f0c040; background: rgba(240,192,64,0.1); }
.crow-num { font-size: 0.65rem; color: #4a4560; min-width: 20px; }
.crow.match .crow-num { color: #f0c040; }
.crow.cur .crow-num { color: #f0c040; }
.crow-chips { display: flex; gap: 3px; }
.cchip {
width: 24px; height: 24px; border-radius: 4px;
display: flex; align-items: center; justify-content: center;
font-size: 0.78rem; font-weight: bold;
}
.cc1 { color: #60d0f0; background: rgba(96,208,240,0.12); border: 1px solid rgba(96,208,240,0.25); }
.cc2 { color: #f07090; background: rgba(240,112,144,0.12); border: 1px solid rgba(240,112,144,0.25); }
.rdiv { font-size: 0.58rem; color: #4a4560; padding: 2px 10px; opacity: 0.5; }

.counter { text-align: center; margin-bottom: 16px; }
.cnum { font-size: 3rem; line-height: 1; color: #f0c040; }
.cof { font-size: 0.68rem; color: #4a4560; letter-spacing: 0.15em; margin-top: 4px; }

.seqdis {
background: #16161f; border: 1px solid #2a2a38;
border-radius: 10px; padding: 16px 18px; margin-bottom: 20px;
display: flex; align-items: center; justify-content: space-between; gap: 8px;
min-height: 64px; position: relative;
}
.seqdis::before {
content: ‘’; position: absolute; left:0;top:0;bottom:0;
width: 3px; background: #f0c040; border-radius: 2px 0 0 2px;
}
.dbtn {
flex: 1; height: 38px; border-radius: 6px;
display: flex; align-items: center; justify-content: center;
font-size: 1rem; font-weight: bold;
}
.d1 { color: #60d0f0; background: rgba(96,208,240,0.12); border: 1px solid rgba(96,208,240,0.25); }
.d2 { color: #f07090; background: rgba(240,112,144,0.12); border: 1px solid rgba(240,112,144,0.25); }

.ctls { display: flex; gap: 10px; }
.cbtn {
flex: 1; padding: 13px 8px; border: none; border-radius: 8px;
font-family: ‘DotGothic16’, monospace; font-size: 0.85rem; cursor: pointer;
}
.cbtn:active { opacity: 0.7; }
.cprev { background: #16161f; color: #c8c0d8; border: 1px solid #2a2a38; }
.cnext { background: #f0c040; color: #0e0e14; font-weight: bold; }
.creset {
flex: 0 0 auto; padding: 13px 16px;
background: transparent; color: #4a4560;
border: 1px solid #2a2a38; border-radius: 8px;
font-family: ‘DotGothic16’, monospace; font-size: 0.85rem; cursor: pointer;
}
</style>

</head>
<body>
<div class="wrapper">

<header>
  <div>
    <div class="title">🥚 참참참</div>
    <div class="sub">TAMAGOTCHI GIMMICK TRACKER</div>
  </div>
  <button class="ham-btn" id="hamBtn">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">전체 시퀀스 목록</div>
  <div id="drawerList"></div>
</div>

<div class="search-row">
  <input class="sinput" id="sinput" type="text" maxlength="5" placeholder="12121">
  <button class="sbtn" id="sbtn">찾기</button>
</div>
<div class="shint" id="shint">숫자 5자리 입력 후 찾기</div>
<div class="rarea" id="rarea"></div>

<div class="counter">
  <div class="cnum" id="cnum">1</div>
  <div class="cof">/ 18 번째 기믹</div>
</div>
<div class="seqdis" id="seqdis"></div>

<div class="ctls">
  <button class="cbtn cprev" id="prevBtn">◀ 이전</button>
  <button class="cbtn cnext" id="nextBtn">다음 ▶</button>
  <button class="creset" id="resetBtn">↺</button>
</div>

</div>
<script>
var SEQS = [
  [2,2,2,1,1],[1,2,1,2,1],[2,2,1,1,2],[1,2,1,2,2],[2,1,1,1,2],
  [1,2,1,2,2],[1,1,2,1,2],[1,2,2,2,1],[1,1,2,1,2],[1,2,2,1,1],
  [2,1,2,1,2],[2,2,1,1,1],[2,1,2,1,2],[2,1,1,2,1],[2,1,2,2,2],
  [1,1,1,2,1],[2,1,2,2,1],[1,2,1,2,1]
];
var N = SEQS.length;
var cur = 0;

try { cur = parseInt(localStorage.getItem(‘tg’) || ‘0’, 10) % N; } catch(e){}

function save() { try { localStorage.setItem(‘tg’, String(cur)); } catch(e){} }

function sk(s) { return s.join(’’); }

function chipH(d, big) {
var cls = big ? (‘cchip cc’ + d) : (‘chip c’ + d);
return ‘<div class="' + cls + '">’ + d + ‘</div>’;
}

function render() {
document.getElementById(‘cnum’).textContent = String(cur + 1);
var h = ‘’;
for (var i = 0; i < SEQS[cur].length; i++) h += ‘<div class="dbtn d' + SEQS[cur][i] + '">’ + SEQS[cur][i] + ‘</div>’;
document.getElementById(‘seqdis’).innerHTML = h;
var rows = document.querySelectorAll(’.crow’);
for (var i = 0; i < rows.length; i++) {
var idx = parseInt(rows[i].getAttribute(‘data-i’));
if (idx === cur) rows[i].className = rows[i].className.replace(’ cur’,’’) + ’ cur’;
else rows[i].className = rows[i].className.replace(’ cur’,’’);
}
var drows = document.querySelectorAll(’.drow’);
for (var i = 0; i < drows.length; i++) {
if (i === cur) drows[i].className = ‘drow cur’;
else drows[i].className = ‘drow’;
var lbl = drows[i].querySelector(’.drow-cur-label’);
if (lbl) lbl.style.display = i === cur ? ‘’ : ‘none’;
}
}

function buildDrawer() {
var h = ‘’;
for (var i = 0; i < N; i++) {
var chips = ‘’;
for (var j = 0; j < SEQS[i].length; j++) chips += chipH(SEQS[i][j], false);
h += ‘<div class="drow' + (i===cur?' cur':'') + '" data-i="' + i + '">’
+ ‘<span class="drow-num">’ + (i+1) + ‘</span>’
+ ‘<div class="drow-chips">’ + chips + ‘</div>’
+ ‘<span class=“drow-cur-label”’ + (i!==cur?’ style=“display:none”’:’’) + ‘>◀ 현재</span>’
+ ‘</div>’;
}
document.getElementById(‘drawerList’).innerHTML = h;
var drows = document.querySelectorAll(’.drow’);
for (var i = 0; i < drows.length; i++) {
(function(idx) {
drows[idx].addEventListener(‘click’, function() { cur=idx; save(); render(); closeDrawer(); });
})(i);
}
}

function openDrawer() {
buildDrawer();
document.getElementById(‘drawer’).className = ‘drawer on’;
document.getElementById(‘overlay’).className = ‘overlay on’;
}
function closeDrawer() {
document.getElementById(‘drawer’).className = ‘drawer’;
document.getElementById(‘overlay’).className = ‘overlay’;
}

document.getElementById(‘hamBtn’).addEventListener(‘click’, function() {
if (document.getElementById(‘drawer’).className.indexOf(‘on’) > -1) closeDrawer();
else openDrawer();
});
document.getElementById(‘overlay’).addEventListener(‘click’, closeDrawer);

document.getElementById(‘prevBtn’).addEventListener(‘click’, function() {
cur = (cur - 1 + N) % N; save(); render();
});
document.getElementById(‘nextBtn’).addEventListener(‘click’, function() {
cur = (cur + 1) % N; save(); render();
});
document.getElementById(‘resetBtn’).addEventListener(‘click’, function() {
cur = 0; save();
document.getElementById(‘rarea’).innerHTML = ‘’;
document.getElementById(‘shint’).textContent = ‘숫자 5자리 입력 후 찾기’;
document.getElementById(‘shint’).className = ‘shint’;
document.getElementById(‘sinput’).value = ‘’;
document.getElementById(‘sinput’).className = ‘sinput’;
render();
});

document.getElementById(‘sinput’).addEventListener(‘input’, function() {
this.value = this.value.replace(/[^12]/g, ‘’);
this.className = ‘sinput’;
document.getElementById(‘shint’).textContent = ‘숫자 5자리 입력 후 찾기’;
document.getElementById(‘shint’).className = ‘shint’;
});
document.getElementById(‘sinput’).addEventListener(‘keydown’, function(e) {
if (e.key === ‘Enter’) doSearch();
});
document.getElementById(‘sbtn’).addEventListener(‘click’, doSearch);

function makeCrow(idx, isMatch) {
var cls = ‘crow’ + (isMatch?’ match’:’’) + (idx===cur?’ cur’:’’);
var chips = ‘’;
for (var j = 0; j < SEQS[idx].length; j++) chips += chipH(SEQS[idx][j], true);
return ‘<div class="' + cls + '" data-i="' + idx + '">’
+ ‘<span class="crow-num">’ + (idx+1) + ‘</span>’
+ ‘<div class="crow-chips">’ + chips + ‘</div>’
+ ‘</div>’;
}

function doSearch() {
var raw = document.getElementById(‘sinput’).value.trim();
var hint = document.getElementById(‘shint’);
var area = document.getElementById(‘rarea’);
if (raw.length !== 5) {
document.getElementById(‘sinput’).className = ‘sinput err’;
hint.textContent = ‘5자리 입력해줘 (예: 12121)’;
hint.className = ‘shint no’;
area.innerHTML = ‘’; return;
}
var q = raw.split(’’).map(Number);
var matches = [];
for (var i = 0; i < N; i++) {
var ok = true;
for (var j = 0; j < 5; j++) if (SEQS[i][j] !== q[j]) { ok=false; break; }
if (ok) matches.push(i);
}
if (!matches.length) {
document.getElementById(‘sinput’).className = ‘sinput err’;
hint.textContent = ‘일치하는 시퀀스 없음’;
hint.className = ‘shint no’;
area.innerHTML = ‘’; return;
}
document.getElementById(‘sinput’).className = ‘sinput’;
hint.textContent = matches.length > 1 ? (matches.length + ‘곳 발견’) : ‘1곳 발견’;
hint.className = ‘shint ok’;

var chains = [];
for (var m = 0; m < matches.length; m++) {
var mi = matches[m];
var chain = [mi];
for (var k = 1; k < N; k++) {
var nx = (mi + k) % N;
if (nx === mi) break;
chain.push(nx);
}
chains.push(chain);
}

var cutLen;
if (matches.length === 1) {
cutLen = chains[0].length;
for (var k = 1; k < chains[0].length; k++) {
if (sk(SEQS[chains[0][k]]) === raw) { cutLen = k + 1; break; }
}
} else {
var minLen = chains[0].length;
for (var m = 1; m < chains.length; m++) if (chains[m].length < minLen) minLen = chains[m].length;
var divergeAt = 1;
for (var k = 1; k < minLen; k++) {
var v0 = sk(SEQS[chains[0][k]]);
var same = true;
for (var m = 1; m < chains.length; m++) if (sk(SEQS[chains[m][k]]) !== v0) { same=false; break; }
divergeAt = k;
if (!same) break;
}
cutLen = divergeAt + 1;
}

var h = ‘’;
for (var gi = 0; gi < chains.length; gi++) {
var label = matches.length > 1 ? (’발견 ’ + (gi+1) + ’ — ’ + (chains[gi][0]+1) + ‘번째’) : ((chains[gi][0]+1) + ‘번째’);
h += ‘<div class="rgroup"><div class="rlabel">’ + label + ‘</div><div class="rchain">’;
var slice = chains[gi].slice(0, cutLen);
for (var ci = 0; ci < slice.length; ci++) {
if (ci === 1) h += ‘<div class="rdiv">↓ 이후</div>’;
h += makeCrow(slice[ci], ci === 0);
}
h += ‘</div></div>’;
}
area.innerHTML = h;

var crows = area.querySelectorAll(’.crow’);
for (var i = 0; i < crows.length; i++) {
(function(el, idx) {
el.addEventListener(‘click’, function() { cur=idx; save(); render(); });
})(crows[i], parseInt(crows[i].getAttribute(‘data-i’)));
}
}

render();
</script>

</body>
</html>
