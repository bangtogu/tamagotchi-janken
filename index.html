<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>참참참 기믹 트래커</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    html, body {
      height: 100dvh;
      overscroll-behavior: contain;
    }
    body {
      background: linear-gradient(135deg, #0f0c1a 0%, #1e1430 100%);
      color: #e0d8ff;
      font-family: "DotGothic16", "Press Start 2P", system-ui, monospace;
      min-height: 100dvh;
      padding: 24px 16px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .wrapper {
      width: 100%;
      max-width: 440px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 32px;
    }
    .title {
      font-family: "Press Start 2P", cursive;
      font-size: 2rem;
      color: #ffe066;
      letter-spacing: 0.12em;
      text-align: center;
      text-shadow: 0 0 12px #ffe066aa, 0 0 24px #ffe06655;
      animation: neon-glow 3s ease-in-out infinite alternate;
    }
    @keyframes neon-glow {
      from { text-shadow: 0 0 10px #ffe06688, 0 0 20px #ffe06644; }
      to   { text-shadow: 0 0 20px #ffe066cc, 0 0 35px #ffe06688; }
    }
    .sub {
      font-size: 0.7rem;
      color: #a08cc8;
      letter-spacing: 0.25em;
      margin-top: 8px;
      opacity: 0.9;
    }
    .ham-btn {
      position: absolute;
      right: 0;
      top: 0;
      background: #1e1a2e;
      border: 2px solid #4a3f70;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      box-shadow: 0 4px 0 #00000088;
      transition: all 0.12s;
    }
    .ham-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #00000088;
    }
    .ham-btn span {
      width: 20px;
      height: 3px;
      background: #ffe066;
      border-radius: 2px;
      box-shadow: 0 0 6px #ffe06688;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 5, 20, 0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
    }
    .overlay.on { display: block; }
    .drawer {
      position: fixed;
      top: 0;
      right: -320px;
      bottom: 0;
      width: 300px;
      height: 100dvh;
      background: #16122a;
      border-left: 3px solid #5a4a8a;
      z-index: 101;
      transition: right 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 0;
      box-shadow: -8px 0 20px rgba(0,0,0,0.6);
    }
    .drawer.on { right: 0; }
    .drawer-title {
      font-size: 0.9rem;
      color: #a08cc8;
      letter-spacing: 0.2em;
      padding: 0 20px 16px;
      border-bottom: 1px solid #3a2f5a;
      margin-bottom: 12px;
    }
    .drow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .drow:hover, .drow:active {
      background: rgba(90, 74, 138, 0.25);
    }
    .drow.cur {
      background: rgba(255, 224, 102, 0.15);
      border-left: 4px solid #ffe066;
    }
    .drow-num {
      font-size: 0.75rem;
      color: #a08cc8;
      min-width: 24px;
    }
    .drow.cur .drow-num {
      color: #ffe066;
    }
    .drow-chips {
      display: flex;
      gap: 6px;
    }
    .drow-cur-label {
      font-size: 0.7rem;
      color: #ffe066;
      margin-left: auto;
    }
    .chip, .cchip {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: bold;
      box-shadow: inset 0 2px 5px rgba(255,255,255,0.15), 0 3px 8px rgba(0,0,0,0.5);
      transition: transform 0.12s;
    }
    .drow:active .chip, .crow:active .cchip {
      transform: scale(0.9);
    }
    .c1, .cc1 { color: #7dd3fc; background: rgba(125,211,252,0.15); border: 1px solid rgba(125,211,252,0.4); }
    .c2, .cc2 { color: #f472b6; background: rgba(244,114,182,0.15); border: 1px solid rgba(244,114,182,0.4); }
    .search-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .sinput {
      flex: 1;
      background: #1e1a2e;
      border: 2px solid #4a3f70;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1.1rem;
      color: #e0d8ff;
      outline: none;
      transition: all 0.2s;
    }
    .sinput:focus {
      border-color: #ffe066;
      box-shadow: 0 0 0 4px rgba(255,224,102,0.25);
    }
    .sinput.err { border-color: #f472b6; }
    .sbtn {
      padding: 14px 20px;
      background: #ffe066;
      color: #1a1230;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 0 #b39f00;
      transition: all 0.12s;
    }
    .sbtn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #b39f00;
    }
    .shint {
      font-size: 0.7rem;
      color: #a08cc8;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      min-height: 20px;
    }
    .shint.ok { color: #ffe066; }
    .shint.no { color: #f472b6; }
    .rarea { margin-bottom: 24px; }
    .rgroup { margin-bottom: 20px; }
    .rlabel {
      font-size: 0.75rem;
      color: #a08cc8;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }
    .rchain { display: flex; flex-direction: column; gap: 6px; }
    .crow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #1e1a2e;
      border: 2px solid #4a3f70;
      cursor: pointer;
      transition: all 0.12s;
    }
    .crow.match {
      border-color: #ffe06688;
      background: rgba(255,224,102,0.08);
    }
    .crow.cur {
      border-color: #ffe066;
      background: rgba(255,224,102,0.15);
    }
    .crow:active {
      transform: translateY(2px);
    }
    .crow-num {
      font-size: 0.75rem;
      color: #a08cc8;
      min-width: 24px;
    }
    .crow.match .crow-num, .crow.cur .crow-num {
      color: #ffe066;
    }
    .crow-chips { display: flex; gap: 6px; }
    .rdiv {
      font-size: 0.65rem;
      color: #a08cc8;
      padding: 4px 12px;
      opacity: 0.7;
    }
    .counter { text-align: center; margin: 20px 0 24px; }
    .cnum {
      font-size: 3.8rem;
      color: #ffe066;
      text-shadow: 0 0 15px #ffe066aa;
    }
    .cof {
      font-size: 0.75rem;
      color: #a08cc8;
      letter-spacing: 0.18em;
      margin-top: 6px;
    }
    .seqdis {
      background: #1e1a2e;
      border: 3px solid #4a3f70;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 28px;
      display: flex;
      gap: 10px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
    }
    .dbtn {
      flex: 1;
      height: 48px;
      border-radius: 12px;
      font-size: 1.3rem;
      font-weight: bold;
      box-shadow: inset 0 2px 6px rgba(255,255,255,0.1);
      transition: transform 0.1s;
    }
    .dbtn:active { transform: scale(0.96); }
    .d1 { color: #7dd3fc; background: rgba(125,211,252,0.15); border: 1px solid rgba(125,211,252,0.4); }
    .d2 { color: #f472b6; background: rgba(244,114,182,0.15); border: 1px solid rgba(244,114,182,0.4); }
    .ctls { display: flex; gap: 12px; }
    .cbtn {
      flex: 1;
      padding: 16px 12px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      box-shadow: 0 5px 0 #00000066;
      transition: all 0.12s;
    }
    .cbtn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #00000066;
    }
    .cprev {
      background: #1e1a2e;
      color: #e0d8ff;
      border: 2px solid #4a3f70;
    }
    .cnext {
      background: #ffe066;
      color: #1a1230;
      font-weight: bold;
    }
    .creset {
      flex: 0 0 auto;
      padding: 16px 20px;
      background: transparent;
      color: #a08cc8;
      border: 2px solid #4a3f70;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div>
      <div class="title">🥚 참참참</div>
      <div class="sub">TAMAGOTCHI GIMMICK TRACKER</div>
    </div>
    <button class="ham-btn" id="hamBtn">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="overlay" id="overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-title">전체 시퀀스 목록</div>
    <div id="drawerList"></div>
  </div>

  <div class="search-row">
    <input class="sinput" id="sinput" type="text" inputmode="numeric" maxlength="5" placeholder="12121">
    <button class="sbtn" id="sbtn">찾기</button>
  </div>
  <div class="shint" id="shint">숫자 5자리 입력 후 찾기</div>
  <div class="rarea" id="rarea"></div>

  <div class="counter">
    <div class="cnum" id="cnum">1</div>
    <div class="cof">/ 18 번째 기믹</div>
  </div>
  <div class="seqdis" id="seqdis"></div>

  <div class="ctls">
    <button class="cbtn cprev" id="prevBtn">◀ 이전</button>
    <button class="cbtn cnext" id="nextBtn">다음 ▶</button>
    <button class="creset" id="resetBtn">↺</button>
  </div>
</div>

<script>
const SEQS = [
  [2,2,2,1,1],[1,2,1,2,1],[2,2,1,1,2],[1,2,1,2,2],[2,1,1,1,2],
  [1,2,1,2,2],[1,1,2,1,2],[1,2,2,2,1],[1,1,2,1,2],[1,2,2,1,1],
  [2,1,2,1,2],[2,2,1,1,1],[2,1,2,1,2],[2,1,1,2,1],[2,1,2,2,2],
  [1,1,1,2,1],[2,1,2,2,1],[1,2,1,2,1]
];
const N = SEQS.length;
let cur = 0;

try {
  const stored = localStorage.getItem("tg");
  if (stored !== null) cur = parseInt(stored, 10) % N;
  if (isNaN(cur)) cur = 0;
} catch (e) { cur = 0; }

function save() {
  try { localStorage.setItem("tg", String(cur)); } catch (e) {}
}

function sk(s) { return s.join(""); }

function chipHTML(d, big) {
  const cls = big ? `cchip cc${d}` : `chip c${d}`;
  return `<div class="${cls}">${d}</div>`;
}

function render() {
  document.getElementById("cnum").textContent = cur + 1;
  let h = "";
  SEQS[cur].forEach(v => h += `<div class="dbtn d${v}">${v}</div>`);
  document.getElementById("seqdis").innerHTML = h;

  document.querySelectorAll(".crow, .drow").forEach(el => {
    const idx = parseInt(el.dataset.i || 0, 10);
    el.classList.toggle("cur", idx === cur);
  });
}

function buildDrawer() {
  let h = "";
  SEQS.forEach((seq, i) => {
    let chips = "";
    seq.forEach(v => chips += chipHTML(v, false));
    h += `<div class="drow${i === cur ? " cur" : ""}" data-i="${i}">
      <span class="drow-num">${i + 1}</span>
      <div class="drow-chips">${chips}</div>
      <span class="drow-cur-label" style="${i !== cur ? "display:none" : ""}">◀ 현재</span>
    </div>`;
  });
  document.getElementById("drawerList").innerHTML = h;

  document.querySelectorAll(".drow").forEach(el => {
    el.addEventListener("click", () => {
      cur = parseInt(el.dataset.i, 10);
      save();
      render();
      closeDrawer();
    });
  });
}

function openDrawer() {
  buildDrawer();
  document.getElementById("drawer").classList.add("on");
  document.getElementById("overlay").classList.add("on");
}

function closeDrawer() {
  document.getElementById("drawer").classList.remove("on");
  document.getElementById("overlay").classList.remove("on");
}

document.getElementById("hamBtn").addEventListener("click", () => {
  if (document.getElementById("drawer").classList.contains("on")) {
    closeDrawer();
  } else {
    openDrawer();
  }
});

document.getElementById("overlay").addEventListener("click", closeDrawer);

document.getElementById("prevBtn").addEventListener("click", () => {
  cur = (cur - 1 + N) % N;
  save();
  render();
});

document.getElementById("nextBtn").addEventListener("click", () => {
  cur = (cur + 1) % N;
  save();
  render();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  cur = 0;
  save();
  document.getElementById("rarea").innerHTML = "";
  document.getElementById("shint").textContent = "숫자 5자리 입력 후 찾기";
  document.getElementById("shint").className = "shint";
  document.getElementById("sinput").value = "";
  document.getElementById("sinput").className = "sinput";
  render();
});

document.getElementById("sinput").addEventListener("input", function() {
  this.value = this.value.replace(/[^12]/g, "");
  this.className = "sinput";
  document.getElementById("shint").textContent = "숫자 5자리 입력 후 찾기";
  document.getElementById("shint").className = "shint";
});

document.getElementById("sinput").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch();
});

document.getElementById("sbtn").addEventListener("click", doSearch);

function makeCrow(idx, isMatch) {
  const cls = `crow${isMatch ? " match" : ""}${idx === cur ? " cur" : ""}`;
  let chips = "";
  SEQS[idx].forEach(v => chips += chipHTML(v, true));
  return `<div class="${cls}" data-i="${idx}">
    <span class="crow-num">${idx + 1}</span>
    <div class="crow-chips">${chips}</div>
  </div>`;
}

function doSearch() {
  const raw = document.getElementById("sinput").value.trim();
  const hint = document.getElementById("shint");
  const area = document.getElementById("rarea");

  if (raw.length !== 5) {
    document.getElementById("sinput").className = "sinput err";
    hint.textContent = "5자리 입력해줘 (예: 12121)";
    hint.className = "shint no";
    area.innerHTML = "";
    return;
  }

  const q = raw.split("").map(Number);
  const matches = [];
  for (let i = 0; i < N; i++) {
    if (SEQS[i].every((v, j) => v === q[j])) matches.push(i);
  }

  if (!matches.length) {
    document.getElementById("sinput").className = "sinput err";
    hint.textContent = "일치하는 시퀀스 없음";
    hint.className = "shint no";
    area.innerHTML = "";
    return;
  }

  document.getElementById("sinput").className = "sinput";
  hint.textContent = matches.length > 1 ? `${matches.length}곳 발견` : "1곳 발견";
  hint.className = "shint ok";

  let cutLen = N;
  if (matches.length > 1) {
    for (let k = 5; k < N; k++) {
      const first = sk(SEQS[(matches[0] + k) % N]);
      let same = true;
      for (let m = 1; m < matches.length; m++) {
        if (sk(SEQS[(matches[m] + k) % N]) !== first) {
          same = false;
          break;
        }
      }
      if (!same) {
        cutLen = k;
        break;
      }
    }
  } else {
    cutLen = 5;
  }

  let h = "";
  matches.forEach((startIdx, gi) => {
    const label = matches.length > 1 
      ? `발견 ${gi + 1} — ${startIdx + 1}번째 시작`
      : `${startIdx + 1}번째`;

    h += `<div class="rgroup"><div class="rlabel">${label}</div><div class="rchain">`;

    for (let offset = 0; offset < cutLen; offset++) {
      const idx = (startIdx + offset) % N;
      if (offset === 1) h += `<div class="rdiv">↓ 이후</div>`;
      h += makeCrow(idx, offset === 0);
    }

    if (cutLen < N && matches.length > 1) {
      h += `<div class="rdiv">→ 여기서부터 분기됨</div>`;
    } else if (matches.length === 1) {
      h += `<div class="rdiv">→ 이후 무한 반복</div>`;
    }

    h += "</div></div>";
  });

  area.innerHTML = h;

  document.querySelectorAll(".crow").forEach(el => {
    el.addEventListener("click", () => {
      cur = parseInt(el.dataset.i, 10);
      save();
      render();
    });
  });
}

render();
</script>
</body>
</html>
